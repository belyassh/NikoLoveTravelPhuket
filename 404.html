<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница не найдена | Niko Travel</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" href="niko_phuket_favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="niko_phuket_favicon.ico" type="image/x-icon" />
    <style>
      :root {
        --bg: #f4f5ef;
        --surface: #fffef8;
        --text: #142027;
        --muted: #55636c;
        --brand: #0c7a6d;
        --line: #d9ded0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Onest", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 5% 10%, rgba(12, 122, 109, 0.12), transparent 35%),
          radial-gradient(circle at 95% 0%, rgba(255, 141, 64, 0.18), transparent 40%),
          var(--bg);
      }

      .card {
        width: min(640px, calc(100% - 2rem));
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface);
        padding: 1.4rem;
      }

      h1 {
        margin: 0 0 0.6rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.65rem 1rem;
        border-radius: 999px;
        background: var(--brand);
        color: #e9fffa;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404: страница не найдена</h1>
      <p>Похоже, адрес устарел или был введен с ошибкой. Вернитесь на главную страницу каталога.</p>
      <a href="./">На главную</a>
    </main>
  </body>
</html>
